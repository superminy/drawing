<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>우리아이 이모지 색칠놀이</title>
    <style>
        /* 기본 스타일 및 태블릿 스크롤 방지 */
        body { 
            text-align: center; 
            font-family: 'Malgun Gothic', sans-serif; 
            background-color: #f7f9fc; 
            margin: 0; 
            padding: 15px; 
            touch-action: none; 
            user-select: none;
        }

        h2 { margin: 10px 0; color: #333; font-size: 24px; }

        /* 1. 상단 이모지 도안 선택 바 */
        .emoji-selector {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 15px;
            background: white;
            padding: 10px;
            border-radius: 50px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            max-width: 500px;
            margin: 0 auto 15px auto;
        }
        .emoji-btn {
            font-size: 30px;
            background: none;
            border: 3px solid transparent;
            border-radius: 50%;
            cursor: pointer;
            padding: 5px;
            transition: all 0.2s;
        }
        .emoji-btn.active {
            border-color: #ff7675;
            background-color: #ffeaa7;
            transform: scale(1.1);
        }

        /* 2. 컨트롤러 영역 (도구, 굵기, 지우개) */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        .palette { display: flex; gap: 10px; }
        .tool-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 3px solid white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: bold;
        }
        .tool-btn.active {
            border-color: #333;
            transform: scale(1.1);
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            padding: 5px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .size-slider { width: 120px; height: 10px; cursor: pointer; accent-color: #ff7675; }

        /* 3. 메인 도화지 영역 (레이어 구조) */
        .artboard {
            position: relative;
            width: 500px;
            height: 500px;
            margin: 0 auto;
            background: white;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            overflow: hidden;
        }
        
        /* 하단 레이어: 실제 그림이 그려지는 캔버스 */
        #paintCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
        }
        
        /* 상단 레이어: 테두리 선만 있는 SVG (펜 터치 관통 필수) */
        .drawing-outline {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none; /* ⭐️ 펜 터치가 이 레이어를 통과해 캔버스에 찍힘 */
        }
        .drawing-outline path {
            fill: none;
            stroke: #2c3e50;
            stroke-width: 6;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
</head>
<body>

    <h2>🎨 내 맘대로 이모지 색칠놀이</h2>

    <!-- 상단 이모지 선택 메뉴 -->
    <div class="emoji-selector">
        <button class="emoji-btn active" onclick="loadDesign('chick', this)">🐥</button>
        <button class="emoji-btn" onclick="loadDesign('heart', this)">❤️</button>
        <button class="emoji-btn" onclick="loadDesign('star', this)">⭐</button>
        <button class="emoji-btn" onclick="loadDesign('fish', this)">🐟</button>
    </div>

    <!-- 중간 제어 도구 메뉴 -->
    <div class="controls">
        <div class="palette">
            <div class="tool-btn active" style="background-color: #ff7675;" onclick="selectTool('pen', '#ff7675', this)"></div>
            <div class="tool-btn" style="background-color: #ffeaa7;" onclick="selectTool('pen', '#ffeaa7', this)"></div>
            <div class="tool-btn" style="background-color: #74b9ff;" onclick="selectTool('pen', '#74b9ff', this)"></div>
            <div class="tool-btn" style="background-color: #55efc4;" onclick="selectTool('pen', '#55efc4', this)"></div>
            <div class="tool-btn" style="background-color: #a29bfe;" onclick="selectTool('pen', '#a29bfe', this)"></div>
            <div class="tool-btn" style="background-color: #dfe6e9; color:#2c3e50;" onclick="selectTool('eraser', null, this)">지우개</div>
            <div class="tool-btn" style="background-color: #ffcb74; color:#fff;" onclick="clearAll()">🗑️</div>
        </div>
        
        <div class="slider-container">
            <label style="font-size:14px; font-weight:bold;">두께</label>
            <input type="range" id="penSize" class="size-slider" min="5" max="60" value="20" oninput="updateSize(this.value)">
        </div>
    </div>

    <!-- 하단 도화지 및 테두리 영역 -->
    <div class="artboard">
        <canvas id="paintCanvas" width="500" height="500"></canvas>
        <svg class="drawing-outline" viewBox="0 0 200 200" id="outlineSvg">
            <!-- 기본 도안: 병아리 모양 path -->
            <path id="outlinePath" d="M 60 70 A 22 22 0 1 1 90 50 M 140 70 A 22 22 0 1 0 110 50 M 65 75 Q 35 110 65 150 Q 100 175 135 150 Q 165 110 135 75 Q 100 55 65 75 Z" />
        </svg>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const sizeInput = document.getElementById('penSize');
        const outlinePath = document.getElementById('outlinePath');
        
        let isDrawing = false;
        let currentMode = 'pen';
        let currentColor = '#ff7675';

        // 각 이모지별 테두리 SVG 데이터 (좌표값 가이드)
        const designs = {
            chick: "M 60 70 A 22 22 0 1 1 90 50 M 140 70 A 22 22 0 1 0 110 50 M 65 75 Q 35 110 65 150 Q 100 175 135 150 Q 165 110 135 75 Q 100 55 65 75 Z",
            heart: "M 100 60 C 80 20, 20 20, 20 80 C 20 130, 80 160, 100 185 C 120 160, 180 130, 180 80 C 180 20, 120 20, 100 60 Z",
            star: "M 100 15 L 125 68 L 182 72 L 138 110 L 152 165 L 100 136 L 48 165 L 62 110 L 18 72 L 75 68 Z",
            fish: "M 25 100 C 55 45, 135 45, 165 100 C 135 155, 55 155, 25 100 M 165 100 L 190 75 L 180 100 L 190 125 Z M 60 90 A 4 4 0 1 1 60 91"
        };

        // 초기 세팅
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = sizeInput.value;
        ctx.strokeStyle = currentColor;

        // ⭐️ 이모지 도안 변경 함수
        function loadDesign(type, element) {
            // 버튼 활성화 스타일 전환
            document.querySelectorAll('.emoji-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            // 테두리 선 교체 및 도화지 초기화
            outlinePath.setAttribute('d', designs[type]);
            clearAll();
        }

        // 펜 두께 실시간 업데이트
        function updateSize(value) {
            ctx.lineWidth = value;
        }

        // 태블릿 스타일러스/터치 최적화 포인터 이벤트
        canvas.addEventListener('pointerdown', (e) => {
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        });

        canvas.addEventListener('pointerup', () => isDrawing = false);
        canvas.addEventListener('pointerleave', () => isDrawing = false);

        // 도구 설정 (그리기 vs 진짜 지우개)
        function selectTool(mode, color, element) {
            currentMode = mode;
            document.querySelectorAll('.tool-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');

            if (mode === 'eraser') {
                ctx.globalCompositeOperation = 'destination-out'; // 기존 투명 영역 파내기
                ctx.lineWidth = Math.max(parseInt(sizeInput.value), 30); // 지우개는 항상 좀 더 큼직하게
            } else {
                ctx.globalCompositeOperation = 'source-over'; // 일반 그리기 모드
                currentColor = color;
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = sizeInput.value;
            }
        }

        // 전체 화면 지우기 (휴지통 기능)
        function clearAll() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }
    </script>
</body>
</html>
