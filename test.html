<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>태블릿 펜 색칠놀이</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f5f5f5; margin: 0; padding: 20px;   touch-action: none; /* 브라우저 기본 스크롤/확대 방지 */ }
        .palette { display: flex; justify-content: center; gap: 15px; margin-bottom: 20px; }
        .color-btn { width: 50px; height: 50px; border-radius: 50%; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); cursor: pointer; }
        .color-btn.active { border-color: #333; transform: scale(1.1); }
        
        /* ⭐️ 핵심: 레이어 쌓기 */
        .artboard { position: relative; width: 400px; height: 400px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); overflow: hidden; }
        
        /* 밑바닥: 그림이 그려지는 도화지 */
        #paintCanvas { position: absolute; top: 0; left: 0; z-index: 1; width: 100%; height: 100%; }
        
        /* 맨 위: 테두리 도안 (터치 관통 설정) */
        .drawing-outline { position: absolute; top: 0; left: 0; z-index: 2; width: 100%; height: 100%; 
                           pointer-events: none; /* ⭐️ 펜 터치가 이 레이어를 통과해 캔버스에 닿음 */ }
        .drawing-outline path { fill: none; stroke: #2c3e50; stroke-width: 5; stroke-linecap: round; stroke-linejoin: round; }
    </style>
</head>
<body>

    <h2>✏️ 펜으로 부드럽게 칠해요</h2>

    <!-- 팔레트 -->
    <div class="palette">
        <div class="color-btn active" style="background-color: #ff7675;" onclick="changeColor('#ff7675', this)"></div>
        <div class="color-btn" style="background-color: #ffeaa7;" onclick="changeColor('#ffeaa7', this)"></div>
        <div class="color-btn" style="background-color: #74b9ff;" onclick="changeColor('#74b9ff', this)"></div>
        <div class="color-btn" style="background-color: #55efc4;" onclick="changeColor('#55efc4', this)"></div>
        <div class="color-btn" style="background-color: #ffffff;" onclick="changeColor('#ffffff', this)"></div> <!-- 지우개 역할 -->
    </div>

    <!-- 작업 영역 -->
    <div class="artboard">
        <!-- 그림 그려지는 곳 -->
        <canvas id="paintCanvas" width="400" height="400"></canvas>
        
        <!-- 위에 얹은 도안 레이어 (예시: 귀여운 곰돌이 얼굴) -->
        <svg class="drawing-outline" viewBox="0 0 200 200">
            <!-- 왼쪽 귀 -->
            <path d="M 60 70 A 22 22 0 1 1 90 50" />
            <!-- 오른쪽 귀 -->
            <path d="M 140 70 A 22 22 0 1 0 110 50" />
            <!-- 얼굴 메인 선 -->
            <path d="M 65 75 Q 35 110 65 150 Q 100 175 135 150 Q 165 110 135 75 Q 100 55 65 75 Z" />
            <!-- 눈, 코, 입 -->
            <circle cx="85" cy="105" r="5" fill="#2c3e50" />
            <circle cx="115" cy="105" r="5" fill="#2c3e50" />
            <path d="M 95 125 Q 100 130 105 125" />
        </svg>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        
        let isDrawing = false;
        let currentColor = '#ff7675';

        // 펜 설정 (아이가 사용하는 거라 부드럽고 두껍게 설정)
        ctx.lineWidth = 15; 
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // ⭐️ 태블릿용 Pointer Events 적용
        canvas.addEventListener('pointerdown', (e) => {
            isDrawing = true;
            ctx.beginPath();
            // 정확한 좌표 계산
            ctx.moveTo(e.offsetX, e.offsetY);
            ctx.strokeStyle = currentColor;
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        });

        canvas.addEventListener('pointerup', () => isDrawing = false);
        canvas.addEventListener('pointerleave', () => isDrawing = false);

        // 색상 변경 함수
        function changeColor(color, element) {
            currentColor = color;
            document.querySelectorAll('.color-btn').forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
            
            // 지우개 모드일 때는 선을 조금 더 두껍게 해주면 편합니다
            ctx.lineWidth = color === '#ffffff' ? 30 : 15;
        }
    </script>
</body>
</html>
