<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>반짝반짝 네일아트 놀이 (드래그앤드롭)</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Malgun Gothic', sans-serif; 
            background: linear-gradient(135deg, #ffeaa7, #ffc0cb); 
            margin: 0; 
            padding: 10px; 
            touch-action: none; 
            user-select: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h2 { margin: 0 0 10px 0; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.15); font-size: 26px; }

        .game-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            max-width: 900px;
            width: 100%;
        }

        .left-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .right-menu {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .menu-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .column-title { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 2px; }

        .btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid white;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }
        .btn.active {
            border-color: #e84393;
            transform: scale(1.1);
            background-color: #fff0f6;
        }

        /* 드래그할 스티커 마우스 커서 및 스타일 */
        .sticker-item {
            cursor: grab;
            touch-action: none; /* 브라우저 자체 스크롤 방지 */
        }
        .sticker-item:active { cursor: grabbing; }

        /* ⭐️ 드래그할 때 마우스/펜 끝에 따라다닐 유령 이모지 스타일 */
        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            user-select: none;
        }

        .slider-box {
            background: white;
            padding: 8px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .slider-box span { font-size: 11px; font-weight: bold; color: #555; }
        .size-slider { width: 15px; height: 80px; writing-mode: vertical-lr; direction: rtl; accent-color: #e84393; cursor: pointer; }

        .artboard {
            position: relative;
            width: 450px;
            height: 550px;
            background: radial-gradient(circle, #ffffff, #f7d6e0);
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        #paintCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
        }
        
        .finger-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .finger-overlay path {
            fill: #fbc5b1;
            fill-rule: evenodd;
            stroke: #e09985;
            stroke-width: 3;
        }
    </style>
</head>
<body>

    <h2>💅 끌어다 붙이는 반짝반짝 네일아트</h2>

    <div class="game-container">
        <!-- 왼쪽 메뉴 -->
        <div class="left-menu">
            <button class="btn" style="background-color: #ff7675; color: white; font-size: 18px;" onclick="undo()">↩️</button>
            <button class="btn" style="background-color: #ffeaa7;" onclick="clearAll()">🗑️</button>
            <hr style="width:80%; border:1px solid #ccc; margin: 5px 0;">
            <button id="tool-pen" class="btn active" onclick="setMode('pen')">✏️</button>
            <button id="tool-eraser" class="btn" onclick="setMode('eraser')">🧼</button>
            
            <div class="slider-box">
                <span>크기</span>
                <input type="range" id="penSize" class="size-slider" min="5" max="60" value="20" oninput="updateSize(this.value)">
            </div>
        </div>

        <!-- 중앙 도화지판 -->
        <div class="artboard">
            <canvas id="paintCanvas" width="450" height="550"></canvas>
            <svg class="finger-overlay" viewBox="0 0 450 550">
                <path d="M 0 0 H 450 V 550 H 0 Z 
                         M 160 180 C 160 140, 290 140, 290 180 V 440 C 290 460, 160 460, 160 440 Z" />
            </svg>
        </div>

        <!-- 오른쪽 메뉴: 매니큐어 베이스 및 드래그용 스티커 -->
        <div class="right-menu">
            <div class="menu-column">
                <span class="column-title">바탕색</span>
                <button class="btn" style="background: #e84393;" onclick="fillPattern('color', '#e84393')"></button>
                <button class="btn" style="background: #9b59b6;" onclick="fillPattern('color', '#9b59b6')"></button>
                <button class="btn" style="background: linear-gradient(to right, #ff7675, #ffeaa7, #74b9ff);" onclick="fillPattern('rainbow')">🌈</button>
                <button class="btn" style="background: radial-gradient(#fff 20%, #fd79a8 21%); background-size: 10px 10px;" onclick="fillPattern('dots')">🔮</button>
                <button class="btn" style="background: #fff; font-size:16px; font-weight:bold;" onclick="fillPattern('color', '#ffffff')">지움</button>
            </div>
            
            <!-- ⭐️ 스티커 영역: onpointerdown 이벤트로 드래그 트리거 -->
            <div class="menu-column">
                <span class="column-title">스티커</span>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🐸')">🐸</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🦁')">🦁</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🐰')">🐰</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🐼')">🐼</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🧁')">🧁</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const sizeInput = document.getElementById('penSize');
        
        let isDrawing = false;
        let currentMode = 'pen'; 
        let currentColor = '#e84393';
        
        let undoStack = [];
        const maxUndo = 15;

        // 드래그앤드롭 전용 변수
        let dragGhost = null;
        let draggedSticker = '';

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = sizeInput.value;
        ctx.strokeStyle = currentColor;

        function saveState() {
            if (undoStack.length >= maxUndo) undoStack.shift();
            undoStack.push(canvas.toDataURL());
        }

        function undo() {
            if (undoStack.length === 0) return;
            let previousState = undoStack.pop();
            let img = new Image();
            img.src = previousState;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tool-pen').classList.remove('active');
            document.getElementById('tool-eraser').classList.remove('active');
            
            if (mode === 'pen') {
                document.getElementById('tool-pen').classList.add('active');
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = sizeInput.value;
            } else if (mode === 'eraser') {
                document.getElementById('tool-eraser').classList.add('active');
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = Math.max(parseInt(sizeInput.value), 25);
            }
        }

        function updateSize(value) {
            ctx.lineWidth = value;
        }

        // 바탕 칠하기
        function fillPattern(type, arg = '') {
            saveState();
            ctx.globalCompositeOperation = 'source-over';
            if (type === 'color') {
                ctx.fillStyle = arg;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                currentColor = arg;
                if (currentMode === 'pen') ctx.strokeStyle = currentColor;
            } else if (type === 'rainbow') {
                let grad = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
                grad.addColorStop(0, '#ff7675');
                grad.addColorStop(0.5, '#ffeaa7');
                grad.addColorStop(1, '#74b9ff');
                ctx.fillStyle = grad;
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            } else if (type === 'dots') {
                ctx.fillStyle = '#fd79a8';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = '#ffffff';
                for (let x = 10; x < canvas.width; x += 25) {
                    for (let y = 10; y < canvas.height; y += 25) {
                        ctx.beginPath();
                        ctx.arc(x, y, 4, 0, Math.PI * 2);
                        ctx.fill();
                    }
                }
            }
        }

        function clearAll() {
            saveState();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 👑 핵심: 터치/펜용 실시간 드래그앤드롭 구현
        function startDrag(e, sticker) {
            e.preventDefault();
            draggedSticker = sticker;
            
            // 1. 화면에 따라다닐 유령 이모지 요소 생성
            dragGhost = document.createElement('div');
            dragGhost.className = 'drag-ghost';
            dragGhost.innerText = sticker;
            
            // 왼쪽 메뉴의 '크기' 슬라이더 값을 반영하여 스티커 크기 결정
            const size = parseInt(sizeInput.value) * 2;
            dragGhost.style.fontSize = `${size}px`;
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
            
            document.body.appendChild(dragGhost);
            
            // 2. 글로벌 이벤트를 등록하여 스크린 전체에서 추적
            window.addEventListener('pointermove', onDrag);
            window.addEventListener('pointerup', onDrop);
        }

        function onDrag(e) {
            if (!dragGhost) return;
            // 펜/손가락 끝 좌표에 유령 이모지 밀착 이동
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
        }

        function onDrop(e) {
            if (!dragGhost) return;
            
            // 캔버스의 화면상 절대 위치 계산
            const rect = canvas.getBoundingClientRect();
            
            // 드롭한 위치가 캔버스 내부 영역인지 판별
            if (e.clientX >= rect.left && e.clientX <= rect.right &&
                e.clientY >= rect.top && e.clientY <= rect.bottom) {
                
                // 캔버스 내부 상대 좌표로 치환
                const canvasX = e.clientX - rect.left;
                const canvasY = e.clientY - rect.top;
                
                saveState();
                ctx.globalCompositeOperation = 'source-over';
                ctx.font = `${parseInt(sizeInput.value) * 2}px 'Malgun Gothic'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                // 캔버스에 안착시키기
                ctx.fillText(draggedSticker, canvasX, canvasY);
            }
            
            // 유령 요소 삭제 및 이벤트 해제
            document.body.removeChild(dragGhost);
            dragGhost = null;
            window.removeEventListener('pointermove', onDrag);
            window.removeEventListener('pointerup', onDrop);
        }

        // 일반 캔버스 그리기/지우기 로직 (스티커 드래그와 완전 분리)
        canvas.addEventListener('pointerdown', (e) => {
            saveState();
            isDrawing = true;
            ctx.beginPath();
            ctx.moveTo(e.offsetX, e.offsetY);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            ctx.lineTo(e.offsetX, e.offsetY);
            ctx.stroke();
        });

        canvas.addEventListener('pointerup', () => isDrawing = false);
        canvas.addEventListener('pointerleave', () => isDrawing = false);
    </script>
</body>
</html>
