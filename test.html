<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>반짝반짝 리얼 네일아트 놀이</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Malgun Gothic', sans-serif; 
            background: linear-gradient(135deg, #ffeaa7, #ffc0cb); 
            margin: 0; 
            padding: 10px; 
            touch-action: none; 
            user-select: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h2 { margin: 5px 0 15px 0; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.15); font-size: 28px; }

        .game-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        .left-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }

        .right-menu {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.75);
            padding: 18px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            flex-shrink: 0;
        }
        .menu-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .column-title { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 2px; }

        /* ⭐️ 스티커가 많아져서 정렬해주는 예쁜 그리드 슬롯 */
        .sticker-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            max-height: 360px;
            overflow-y: auto;
            padding-right: 4px;
        }
        /* 스티커 스크롤바 디자인 */
        .sticker-grid::-webkit-scrollbar { width: 6px; }
        .sticker-grid::-webkit-scrollbar-thumb { background: #ffb6c1; border-radius: 10px; }

        .btn {
            width: 58px;
            height: 58px;
            border-radius: 50%;
            border: 3px solid white;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }
        .btn.active {
            border-color: #e84393;
            transform: scale(1.08);
            background-color: #fff0f6;
        }

        .sticker-item {
            cursor: grab;
            touch-action: none;
        }
        .sticker-item:active { cursor: grabbing; }

        /* 화면을 밀고 가는 드래그 이모지 */
        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            user-select: none;
        }

        .slider-box {
            background: white;
            padding: 8px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .slider-box span { font-size: 11px; font-weight: bold; color: #555; }
        .size-slider { width: 15px; height: 90px; writing-mode: vertical-lr; direction: rtl; accent-color: #e84393; cursor: pointer; }

        /* 👑 중앙 도화지 판: 왜곡 없는 1:1 고정 구조 */
        .artboard {
            position: relative;
            width: 450px;
            height: 550px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            flex-shrink: 0; 
            background-color: #f3edf5;
        }
        
        /* [하단 레이어] 순수 캔버스 (기본 손톱색 탑재) */
        #paintCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ffffff, #f7d6e0);
            transition: background 0.25s ease;
        }
        
        /* [상단 오버레이 레이어] 마스크 구멍이 뚫린 진짜 손가락 가림막 */
        .finger-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none; /* 터치가 아래 캔버스로 다이렉트 통과 */
        }

        @media (max-width: 768px) {
            body { justify-content: flex-start; overflow-y: auto; }
            .game-container { flex-direction: column; gap: 15px; }
            .left-menu { flex-direction: row; width: 450px; justify-content: space-between; }
            .slider-box { flex-direction: row; height: 44px; padding: 0 15px; border-radius: 25px; }
            .size-slider { writing-mode: horizontal-tb; width: 80px; height: 15px; }
            .right-menu { flex-direction: column; width: 420px; }
            .sticker-grid { grid-template-columns: repeat(7, 1fr); max-height: none; }
        }
    </style>
</head>
<body>

    <h2>💅 반짝반짝 투명 마스크 네일아트</h2>

    <div class="game-container">
        <!-- 왼쪽 메뉴 -->
        <div class="left-menu">
            <button class="btn" style="background-color: #ff7675; color: white; font-size: 18px;" onclick="undo()">↩️</button>
            <button class="btn" style="background-color: #ffeaa7;" onclick="clearAll()">🗑️</button>
            <button id="tool-pen" class="btn active" onclick="setMode('pen')">✏️</button>
            <button id="tool-eraser" class="btn" onclick="setMode('eraser')">🧼</button>
            
            <div class="slider-box">
                <span>크기</span>
                <input type="range" id="penSize" class="size-slider" min="15" max="60" value="35" oninput="updateSize(this.value)">
            </div>
        </div>

        <!-- 중앙 도화지판 -->
        <div class="artboard">
            <canvas id="paintCanvas" width="450" height="550"></canvas>
            
            <!-- 👑 완벽한 좌표 일치와 바탕색 연출을 위한 최신 SVG 마스크 레이어 -->
            <svg class="finger-overlay" viewBox="0 0 450 550">
                <defs>
                    <!-- 마스크 선언: 흰색은 화면을 채우고, 검은색(손톱 모양) 영역만 아래 캔버스를 투명하게 보여줌 -->
                    <mask id="nail-hole">
                        <rect width="450" height="550" fill="white" />
                        <path d="M 155 130 C 155 85, 295 85, 295 130 L 280 380 C 280 405, 170 405, 170 380 Z" fill="black" />
                    </mask>
                </defs>
                
                <!-- 손톱 구멍이 뻥 뚫리는 그래픽 그룹 -->
                <g mask="url(#nail-hole)">
                    <!-- 네일 테이블 바닥 배경 -->
                    <rect width="450" height="550" fill="#f3edf5" />
                    <!-- 진짜 예쁜 손가락 피부 모양 -->
                    <path d="M 75 550 L 110 110 C 110 25, 340 25, 340 110 L 375 550 Z" fill="#fbc5b1" stroke="#e09985" stroke-width="2"/>
                </g>
                
                <!-- 구멍 뚫린 가장자리를 깔끔하게 마감해주는 실감나는 큐티클 라인 및 마디 주름 -->
                <path d="M 170 380 C 170 405, 280 405, 280 380" fill="none" stroke="#d18671" stroke-width="3" stroke-linecap="round" />
                <path d="M 115 475 C 165 485, 285 485, 335 475" fill="none" stroke="#e09985" stroke-width="2" stroke-linecap="round" />
                <path d="M 120 487 C 170 497, 280 497, 330 487" fill="none" stroke="#e09985" stroke-width="1.5" stroke-linecap="round" />
            </svg>
        </div>

        <!-- 오른쪽 메뉴 -->
        <div class="right-menu">
            <div class="menu-column">
                <span class="column-title">바탕색</span>
                <button class="btn" style="background: #e84393;" onclick="fillPattern('color', '#e84393')"></button>
                <button class="btn" style="background: #9b59b6;" onclick="fillPattern('color', '#9b59b6')"></button>
                <button class="btn" style="background: linear-gradient(to bottom, #ff7675, #ffeaa7, #74b9ff);" onclick="fillPattern('rainbow')">🌈</button>
                <button class="btn" style="background: radial-gradient(#fff 20%, #fd79a8 21%) 0 0 / 14px 14px;" onclick="fillPattern('dots')">🔮</button>
                <button class="btn" style="background: #fff; font-size:15px; font-weight:bold;" onclick="fillPattern('clear')">지움</button>
            </div>
            
            <div class="menu-column">
                <span class="column-title">스티커 (총 14종)</span>
                <!-- 👑 스티커 대폭 추가 및 그리드 배치 -->
                <div class="sticker-grid">
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '💖')">💖</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '⭐')">⭐</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🎀')">🎀</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '💎')">💎</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '👑')">👑</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🦄')">🦄</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🍒')">🍒</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🐰')">🐰</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🐼')">🐼</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🐱')">🐱</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🦁')">🦁</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🐸')">🐸</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🧁')">🧁</div>
                    <div class="btn sticker-item" onpointerdown="startDrag(event, '🌼')">🌼</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const sizeInput = document.getElementById('penSize');
        
        let isDrawing = false;
        let currentMode = 'pen'; 
        let currentColor = '#e84393';
        
        let undoStack = [];
        const maxUndo = 15;

        let dragGhost = null;
        let draggedSticker = '';

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = sizeInput.value;
        ctx.strokeStyle = currentColor;

        // 1:1 완벽 보정 캔버스 터치 매핑 함수
        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function saveState() {
            if (undoStack.length >= maxUndo) undoStack.shift();
            undoStack.push(canvas.toDataURL());
        }

        function undo() {
            if (undoStack.length === 0) return;
            let previousState = undoStack.pop();
            let img = new Image();
            img.src = previousState;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tool-pen').classList.remove('active');
            document.getElementById('tool-eraser').classList.remove('active');
            
            if (mode === 'pen') {
                document.getElementById('tool-pen').classList.add('active');
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = sizeInput.value;
            } else if (mode === 'eraser') {
                document.getElementById('tool-eraser').classList.add('active');
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = Math.max(parseInt(sizeInput.value), 25);
            }
        }

        function updateSize(value) {
            ctx.lineWidth = value;
        }

        // 👑 이제 마스크 구멍 아래에서 캔버스 배경이 직접 바뀌므로 지우개 버그 완벽 차단!
        function fillPattern(type, arg = '') {
            if (type === 'color') {
                canvas.style.background = arg;
                currentColor = arg;
                if (currentMode === 'pen') ctx.strokeStyle = currentColor;
            } else if (type === 'rainbow') {
                canvas.style.background = 'linear-gradient(to bottom, #ff7675, #ffeaa7, #74b9ff)';
            } else if (type === 'dots') {
                canvas.style.background = 'radial-gradient(#fff 20%, #fd79a8 21%) 0 0 / 14px 14px';
            } else if (type === 'clear') {
                canvas.style.background = 'radial-gradient(circle, #ffffff, #f7d6e0)';
            }
        }

        function clearAll() {
            saveState();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 드래그 시작
        function startDrag(e, sticker) {
            e.preventDefault();
            draggedSticker = sticker;
            
            dragGhost = document.createElement('div');
            dragGhost.className = 'drag-ghost';
            dragGhost.innerText = sticker;
            
            // 👑 스티커 크기 배율 대폭 하향 보정 (0.75 배수) -> 작고 귀엽게 들어감
            const size = parseInt(sizeInput.value) * 0.75;
            dragGhost.style.fontSize = `${size}px`;
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
            
            document.body.appendChild(dragGhost);
            
            window.addEventListener('pointermove', onDrag);
            window.addEventListener('pointerup', onDrop);
        }

        function onDrag(e) {
            if (!dragGhost) return;
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
        }

        // 드롭 안착 (정밀 타격)
        function onDrop(e) {
            if (!dragGhost) return;
            
            const rect = canvas.getBoundingClientRect();
            
            if (e.clientX >= rect.left && e.clientX <= rect.right &&
                e.clientY >= rect.top && e.clientY <= rect.bottom) {
                
                const coords = getCanvasCoords(e.clientX, e.clientY);
                
                saveState();
                ctx.globalCompositeOperation = 'source-over';
                
                // 안착 스티커 크기 축소 반영
                ctx.font = `${parseInt(sizeInput.value) * 0.75}px 'Malgun Gothic'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(draggedSticker, coords.x, coords.y);
            }
            
            document.body.removeChild(dragGhost);
            dragGhost = null;
            window.removeEventListener('pointermove', onDrag);
            window.removeEventListener('pointerup', onDrop);
        }

        // 드로잉
        canvas.addEventListener('pointerdown', (e) => {
            saveState();
            isDrawing = true;
            ctx.beginPath();
            const coords = getCanvasCoords(e.clientX, e.clientY);
            ctx.moveTo(coords.x, coords.y);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const coords = getCanvasCoords(e.clientX, e.clientY);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        });

        canvas.addEventListener('pointerup', () => isDrawing = false);
        canvas.addEventListener('pointerleave', () => isDrawing = false);
    </script>
</body>
</html>
