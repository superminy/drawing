<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>반짝반짝 네일아트 놀이 (버그 수정판)</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Malgun Gothic', sans-serif; 
            background: linear-gradient(135deg, #ffeaa7, #ffc0cb); 
            margin: 0; 
            padding: 10px; 
            touch-action: none; 
            user-select: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h2 { margin: 0 0 10px 0; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.15); font-size: 26px; }

        .game-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            max-width: 900px;
            width: 100%;
        }

        .left-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .right-menu {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
        }
        .menu-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .column-title { font-size: 12px; font-weight: bold; color: #666; margin-bottom: 2px; }

        .btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 3px solid white;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }
        .btn.active {
            border-color: #e84393;
            transform: scale(1.1);
            background-color: #fff0f6;
        }

        .sticker-item {
            cursor: grab;
            touch-action: none;
        }
        .sticker-item:active { cursor: grabbing; }

        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            user-select: none;
        }

        .slider-box {
            background: white;
            padding: 8px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .slider-box span { font-size: 11px; font-weight: bold; color: #555; }
        .size-slider { width: 15px; height: 80px; writing-mode: vertical-lr; direction: rtl; accent-color: #e84393; cursor: pointer; }

        /* 메인 판 크기 제한 및 고정 */
        .artboard {
            position: relative;
            width: 450px;
            height: 550px;
            background: radial-gradient(circle, #ffffff, #f7d6e0); /* 초기 기본 손톱색 */
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        
        #paintCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
        }
        
        .finger-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .finger-overlay path {
            fill: #fbc5b1;
            fill-rule: evenodd;
            stroke: #e09985;
            stroke-width: 3;
        }
    </style>
</head>
<body>

    <h2>💅 끌어다 붙이는 반짝반짝 네일아트</h2>

    <div class="game-container">
        <!-- 왼쪽 메뉴 -->
        <div class="left-menu">
            <button class="btn" style="background-color: #ff7675; color: white; font-size: 18px;" onclick="undo()">↩️</button>
            <button class="btn" style="background-color: #ffeaa7;" onclick="clearAll()">🗑️</button>
            <hr style="width:80%; border:1px solid #ccc; margin: 5px 0;">
            <button id="tool-pen" class="btn active" onclick="setMode('pen')">✏️</button>
            <button id="tool-eraser" class="btn" onclick="setMode('eraser')">🧼</button>
            
            <div class="slider-box">
                <span>크기</span>
                <input type="range" id="penSize" class="size-slider" min="5" max="60" value="20" oninput="updateSize(this.value)">
            </div>
        </div>

        <!-- 중앙 도화지판 -->
        <div id="nailArtboard" class="artboard">
            <canvas id="paintCanvas" width="450" height="550"></canvas>
            <svg class="finger-overlay" viewBox="0 0 450 550">
                <path d="M 0 0 H 450 V 550 H 0 Z 
                         M 160 180 C 160 140, 290 140, 290 180 V 440 C 290 460, 160 460, 160 440 Z" />
            </svg>
        </div>

        <!-- 오른쪽 메뉴 -->
        <div class="right-menu">
            <div class="menu-column">
                <span class="column-title">바탕색</span>
                <button class="btn" style="background: #e84393;" onclick="fillPattern('color', '#e84393')"></button>
                <button class="btn" style="background: #9b59b6;" onclick="fillPattern('color', '#9b59b6')"></button>
                <button class="btn" style="background: linear-gradient(to right, #ff7675, #ffeaa7, #74b9ff);" onclick="fillPattern('rainbow')">🌈</button>
                <button class="btn" style="background: radial-gradient(#fff 20%, #fd79a8 21%); background-size: 10px 10px;" onclick="fillPattern('dots')">🔮</button>
                <button class="btn" style="background: #fff; font-size:16px; font-weight:bold;" onclick="fillPattern('clear')">지움</button>
            </div>
            
            <div class="menu-column">
                <span class="column-title">스티커</span>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🐸')">🐸</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🦁')">🦁</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🐰')">🐰</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🐼')">🐼</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🧁')">🧁</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const artboard = document.getElementById('nailArtboard');
        const sizeInput = document.getElementById('penSize');
        
        let isDrawing = false;
        let currentMode = 'pen'; 
        let currentColor = '#e84393';
        
        let undoStack = [];
        const maxUndo = 15;

        let dragGhost = null;
        let draggedSticker = '';

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = sizeInput.value;
        ctx.strokeStyle = currentColor;

        // ⭐️ 핵심 수정 1: 화면 크기가 변해도 정확한 내부 캔버스 좌표를 구해주는 함수
        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function saveState() {
            if (undoStack.length >= maxUndo) undoStack.shift();
            undoStack.push(canvas.toDataURL());
        }

        function undo() {
            if (undoStack.length === 0) return;
            let previousState = undoStack.pop();
            let img = new Image();
            img.src = previousState;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tool-pen').classList.remove('active');
            document.getElementById('tool-eraser').classList.remove('active');
            
            if (mode === 'pen') {
                document.getElementById('tool-pen').classList.add('active');
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = sizeInput.value;
            } else if (mode === 'eraser') {
                document.getElementById('tool-eraser').classList.add('active');
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = Math.max(parseInt(sizeInput.value), 25);
            }
        }

        function updateSize(value) {
            ctx.lineWidth = value;
        }

        // ⭐️ 핵심 수정 2: 바탕색 변경 시 캔버스를 오염시키지 않고 판(DOM)의 배경을 변경
        // 이렇게 해야 지우개로 지워도 배경색이 파여나가지 않습니다!
        function fillPattern(type, arg = '') {
            if (type === 'color') {
                artboard.style.background = arg;
                currentColor = arg;
                if (currentMode === 'pen') ctx.strokeStyle = currentColor;
            } else if (type === 'rainbow') {
                artboard.style.background = 'linear-gradient(to right, #ff7675, #ffeaa7, #74b9ff)';
            } else if (type === 'dots') {
                artboard.style.background = 'radial-gradient(#fff 20%, #fd79a8 21%) 0 0 / 12px 12px';
            } else if (type === 'clear') {
                artboard.style.background = 'radial-gradient(circle, #ffffff, #f7d6e0)';
            }
        }

        function clearAll() {
            saveState();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 드래그 시작
        function startDrag(e, sticker) {
            e.preventDefault();
            draggedSticker = sticker;
            
            dragGhost = document.createElement('div');
            dragGhost.className = 'drag-ghost';
            dragGhost.innerText = sticker;
            
            const size = parseInt(sizeInput.value) * 2;
            dragGhost.style.fontSize = `${size}px`;
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
            
            document.body.appendChild(dragGhost);
            
            window.addEventListener('pointermove', onDrag);
            window.addEventListener('pointerup', onDrop);
        }

        function onDrag(e) {
            if (!dragGhost) return;
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
        }

        // 스티커 놓기 (정밀 보정 적용)
        function onDrop(e) {
            if (!dragGhost) return;
            
            const rect = canvas.getBoundingClientRect();
            
            // 드롭 위치 체크
            if (e.clientX >= rect.left && e.clientX <= rect.right &&
                e.clientY >= rect.top && e.clientY <= rect.bottom) {
                
                // ⭐️ 보정된 캔버스 내부 좌표 획득
                const coords = getCanvasCoords(e.clientX, e.clientY);
                
                saveState();
                ctx.globalCompositeOperation = 'source-over';
                ctx.font = `${parseInt(sizeInput.value) * 2}px 'Malgun Gothic'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(draggedSticker, coords.x, coords.y);
            }
            
            document.body.removeChild(dragGhost);
            dragGhost = null;
            window.removeEventListener('pointermove', onDrag);
            window.removeEventListener('pointerup', onDrop);
        }

        // ⭐️ 그리기 좌표도 정밀 보정본으로 일괄 수정
        canvas.addEventListener('pointerdown', (e) => {
            saveState();
            isDrawing = true;
            ctx.beginPath();
            const coords = getCanvasCoords(e.clientX, e.clientY);
            ctx.moveTo(coords.x, coords.y);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const coords = getCanvasCoords(e.clientX, e.clientY);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        });

        canvas.addEventListener('pointerup', () => isDrawing = false);
        canvas.addEventListener('pointerleave', () => isDrawing = false);
    </script>
</body>
</html>
