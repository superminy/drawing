<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>반짝반짝 리얼 네일아트 놀이</title>
    <style>
        * { box-sizing: border-box; }

        body { 
            text-align: center; 
            font-family: 'Malgun Gothic', sans-serif; 
            background: linear-gradient(135deg, #ffeaa7, #ffc0cb); 
            margin: 0; 
            padding: 8px; 
            touch-action: none; 
            user-select: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h2 { margin: 5px 0 10px 0; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.15); font-size: 24px; }

        .game-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        .left-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }

        .right-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: rgba(255, 255, 255, 0.85);
            padding: 16px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            width: 280px;
            flex-shrink: 0;
        }
        .menu-column {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }
        .column-title { font-size: 13px; font-weight: bold; color: #555; margin-bottom: 2px; text-align: left; }

        /* 👑 좌우로 부드럽게 스크롤되는 스티커 슬라이더 바 */
        .sticker-slider-container {
            width: 100%;
            overflow: hidden;
            position: relative;
        }
        .sticker-slider {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            -webkit-overflow-scrolling: touch;
            padding: 5px 2px;
            touch-action: pan-x; /* 슬라이더 영역 내에서 좌우 스와이프 허용 */
        }
        /* 스크롤바 디자인 (부드럽고 투명하게 무드 유지) */
        .sticker-slider::-webkit-scrollbar { height: 5px; }
        .sticker-slider::-webkit-scrollbar-thumb { background: rgba(232, 67, 147, 0.3); border-radius: 10px; }

        .color-row {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding-bottom: 4px;
        }

        /* 버튼 스타일 기본 정의 */
        .btn {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            border: 3px solid white;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
            flex-shrink: 0;
        }
        .btn.active {
            border-color: #e84393;
            transform: scale(1.08);
            background-color: #fff0f6;
        }

        .sticker-item { 
            scroll-snap-align: start;
            cursor: grab;
        }
        .sticker-item:active { cursor: grabbing; }

        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            user-select: none;
        }

        .slider-box {
            background: white;
            padding: 8px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .slider-box span { font-size: 11px; font-weight: bold; color: #555; }
        .size-slider { width: 15px; height: 90px; writing-mode: vertical-lr; direction: rtl; accent-color: #e84393; cursor: pointer; }

        /* 중앙 도화지 판 */
        .artboard {
            position: relative;
            width: 450px;
            height: 550px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            flex-shrink: 0; 
        }
        
        /* 👑 획기적 변경: 버그 차단용 독립식 하단 배경 레이어 */
        #nailBackground {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #ffffff, #f7d6e0);
            transition: background 0.25s ease;
        }
        
        /* 그림을 그리는 캔버스는 투명하게 고정 */
        #paintCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
            background: transparent;
        }
        
        .finger-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* ========================================================
           📱 핸드폰 세로화면(Portrait) 완벽 레이아웃 대응 변환
           ======================================================== */
        @media (max-width: 768px) {
            body { justify-content: flex-start; padding: 4px; }
            h2 { font-size: 18px; margin: 2px 0 6px 0; }

            .game-container { 
                flex-direction: column; 
                gap: 8px; 
                width: 100%;
                max-width: 360px;
            }

            /* [상단 메뉴] 콤팩트 가로 정렬 */
            .left-menu { 
                flex-direction: row; 
                width: 100%; 
                justify-content: space-between; 
                align-items: center;
                gap: 4px;
            }
            .left-menu .btn { width: 44px; height: 44px; font-size: 18px; }
            
            .slider-box { flex-direction: row; height: 44px; padding: 0 10px; border-radius: 22px; gap: 4px; }
            .size-slider { writing-mode: horizontal-tb; width: 70px; height: 10px; direction: ltr; }

            /* [중앙 도화지] 화면 가로폭에 맞춰 자동 가변 스케일링 */
            .artboard {
                width: 100%;
                height: auto;
                aspect-ratio: 450 / 550;
                border-radius: 22px;
            }

            /* [하단 메뉴] 가로 슬라이더 형태로 가볍게 가변 배치 */
            .right-menu { 
                flex-direction: column; 
                width: 100%; 
                padding: 10px;
                border-radius: 20px;
                gap: 8px;
            }
            
            .right-menu .btn { width: 46px; height: 46px; font-size: 20px; border-width: 2px; }
            .right-menu .menu-column:first-child .btn { font-size: 12px; }
        }
    </style>
</head>
<body>

    <h2>💅 반짝반짝 모바일 네일 숍</h2>

    <div class="game-container">
        <!-- 상단 기능 툴바 -->
        <div class="left-menu">
            <button class="btn" style="background-color: #ff7675; color: white; font-size: 16px;" onclick="undo()">↩️</button>
            <button class="btn" style="background-color: #ffeaa7;" onclick="clearAll()">🗑️</button>
            <button id="tool-pen" class="btn active" onclick="setMode('pen')">✏️</button>
            <button id="tool-eraser" class="btn" onclick="setMode('eraser')">🧼</button>
            
            <div class="slider-box">
                <span>크기</span>
                <input type="range" id="penSize" class="size-slider" min="15" max="60" value="30" oninput="updateSize(this.value)">
            </div>
        </div>

        <!-- 중앙 손톱 캔버스 아틀리에 -->
        <div class="artboard">
            <!-- 무조건 바뀌는 진짜 배경판 -->
            <div id="nailBackground"></div>
            <!-- 그림판 -->
            <canvas id="paintCanvas" width="450" height="550"></canvas>
            
            <svg class="finger-overlay" viewBox="0 0 450 550">
                <defs>
                    <mask id="nail-hole">
                        <rect width="450" height="550" fill="white" />
                        <path d="M 155 130 C 155 85, 295 85, 295 130 L 280 380 C 280 405, 170 405, 170 380 Z" fill="black" />
                    </mask>
                </defs>
                <g mask="url(#nail-hole)">
                    <rect width="450" height="550" fill="#f3edf5" />
                    <path d="M 75 550 L 110 110 C 110 25, 340 25, 340 110 L 375 550 Z" fill="#fbc5b1" stroke="#e09985" stroke-width="2"/>
                </g>
                <path d="M 170 380 C 170 405, 280 405, 280 380" fill="none" stroke="#d18671" stroke-width="3" stroke-linecap="round" />
                <path d="M 115 475 C 165 485, 285 485, 335 475" fill="none" stroke="#e09985" stroke-width="2" stroke-linecap="round" />
                <path d="M 120 487 C 170 497, 280 497, 330 487" fill="none" stroke="#e09985" stroke-width="1.5" stroke-linecap="round" />
            </svg>
        </div>

        <!-- 하단 꾸미기 바 -->
        <div class="right-menu">
            <div class="menu-column">
                <span class="column-title">바탕 매니큐어 색상</span>
                <div class="color-row">
                    <button class="btn" style="background: #e84393;" onclick="fillPattern('color', '#e84393')"></button>
                    <button class="btn" style="background: #9b59b6;" onclick="fillPattern('color', '#9b59b6')"></button>
                    <button class="btn" style="background: linear-gradient(to bottom, #ff7675, #ffeaa7, #74b9ff);" onclick="fillPattern('rainbow')">🌈</button>
                    <button class="btn" style="background: radial-gradient(#fff 20%, #fd79a8 21%) 0 0 / 14px 14px;" onclick="fillPattern('dots')">🔮</button>
                    <button class="btn" style="background: #fff; font-weight:bold;" onclick="fillPattern('clear')">지움</button>
                </div>
            </div>
            
            <div class="menu-column">
                <span class="column-title">데코 스티커 (옆으로 밀어보세요 👉)</span>
                <div class="sticker-slider-container">
                    <!-- 👑 좌우 스와이프가 지원되는 슬라이더 목록 -->
                    <div class="sticker-slider">
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '💖')">💖</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '⭐')">⭐</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🎀')">🎀</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '💎')">💎</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '👑')">👑</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🦄')">🦄</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🍒')">🍒</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🐰')">🐰</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🐼')">🐼</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🐱')">🐱</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🦁')">🦁</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🐸')">🐸</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🧁')">🧁</div>
                        <div class="btn sticker-item" onpointerdown="startDrag(event, '🌼')">🌼</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const sizeInput = document.getElementById('penSize');
        const nailBg = document.getElementById('nailBackground');
        
        let isDrawing = false;
        let currentMode = 'pen'; 
        let currentColor = '#e84393';
        
        let undoStack = [];
        const maxUndo = 15;

        let dragGhost = null;
        let draggedSticker = '';

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = sizeInput.value;
        ctx.strokeStyle = currentColor;

        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function saveState() {
            if (undoStack.length >= maxUndo) undoStack.shift();
            undoStack.push(canvas.toDataURL());
        }

        function undo() {
            if (undoStack.length === 0) return;
            let previousState = undoStack.pop();
            let img = new Image();
            img.src = previousState;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tool-pen').classList.remove('active');
            document.getElementById('tool-eraser').classList.remove('active');
            
            if (mode === 'pen') {
                document.getElementById('tool-pen').classList.add('active');
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = sizeInput.value;
            } else if (mode === 'eraser') {
                document.getElementById('tool-eraser').classList.add('active');
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = Math.max(parseInt(sizeInput.value), 25);
            }
        }

        function updateSize(value) {
            ctx.lineWidth = value;
        }

        /* 👑 독립 배경 레이어 스타일 제어로 모바일 브라우저 버그 전면 차단 */
        function fillPattern(type, arg = '') {
            if (type === 'color') {
                nailBg.style.background = arg;
                currentColor = arg;
                if (currentMode === 'pen') ctx.strokeStyle = currentColor;
            } else if (type === 'rainbow') {
                nailBg.style.background = 'linear-gradient(to bottom, #ff7675, #ffeaa7, #74b9ff)';
            } else if (type === 'dots') {
                nailBg.style.background = 'radial-gradient(#fff 20%, #fd79a8 21%) 0 0 / 12px 12px';
            } else if (type === 'clear') {
                nailBg.style.background = 'radial-gradient(circle, #ffffff, #f7d6e0)';
            }
        }

        function clearAll() {
            saveState();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 포인터 드래그 제어
        function startDrag(e, sticker) {
            // 슬라이더 바 자체 스크롤 터치와 겹치지 않게 드래그 이탈을 계산
            draggedSticker = sticker;
            
            dragGhost = document.createElement('div');
            dragGhost.className = 'drag-ghost';
            dragGhost.innerText = sticker;
            
            const size = parseInt(sizeInput.value) * 0.75;
            dragGhost.style.fontSize = `${size}px`;
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
            
            document.body.appendChild(dragGhost);
            
            window.addEventListener('pointermove', onDrag);
            window.addEventListener('pointerup', onDrop);
        }

        function onDrag(e) {
            if (!dragGhost) return;
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
        }

        function onDrop(e) {
            if (!dragGhost) return;
            
            const rect = canvas.getBoundingClientRect();
            
            if (e.clientX >= rect.left && e.clientX <= rect.right &&
                e.clientY >= rect.top && e.clientY <= rect.bottom) {
                
                const coords = getCanvasCoords(e.clientX, e.clientY);
                
                saveState();
                ctx.globalCompositeOperation = 'source-over';
                ctx.font = `${parseInt(sizeInput.value) * 0.75}px 'Malgun Gothic'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(draggedSticker, coords.x, coords.y);
            }
            
            document.body.removeChild(dragGhost);
            dragGhost = null;
            window.removeEventListener('pointermove', onDrag);
            window.removeEventListener('pointerup', onDrop);
        }

        // 그리기 영역 이벤트
        canvas.addEventListener('pointerdown', (e) => {
            saveState();
            isDrawing = true;
            ctx.beginPath();
            const coords = getCanvasCoords(e.clientX, e.clientY);
            ctx.moveTo(coords.x, coords.y);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const coords = getCanvasCoords(e.clientX, e.clientY);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        });

        canvas.addEventListener('pointerup', () => isDrawing = false);
        canvas.addEventListener('pointerleave', () => isDrawing = false);
    </script>
</body>
</html>
