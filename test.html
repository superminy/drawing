<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>반짝반짝 리얼 네일아트 놀이</title>
    <style>
        body { 
            text-align: center; 
            font-family: 'Malgun Gothic', sans-serif; 
            background: linear-gradient(135deg, #ffeaa7, #ffc0cb); 
            margin: 0; 
            padding: 10px; 
            touch-action: none; 
            user-select: none;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h2 { margin: 5px 0 15px 0; color: #fff; text-shadow: 2px 2px 4px rgba(0,0,0,0.15); font-size: 28px; }

        .game-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            max-width: 1000px;
            width: 100%;
        }

        .left-menu {
            display: flex;
            flex-direction: column;
            gap: 12px;
            flex-shrink: 0;
        }

        .right-menu {
            display: flex;
            gap: 15px;
            background: rgba(255, 255, 255, 0.6);
            padding: 15px;
            border-radius: 25px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            flex-shrink: 0;
        }
        .menu-column {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .column-title { font-size: 13px; font-weight: bold; color: #666; margin-bottom: 2px; }

        .btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid white;
            background-color: white;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            font-size: 26px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }
        .btn.active {
            border-color: #e84393;
            transform: scale(1.1);
            background-color: #fff0f6;
        }

        .sticker-item {
            cursor: grab;
            touch-action: none;
        }
        .sticker-item:active { cursor: grabbing; }

        .drag-ghost {
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transform: translate(-50%, -50%);
            user-select: none;
        }

        .slider-box {
            background: white;
            padding: 8px;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.05);
        }
        .slider-box span { font-size: 11px; font-weight: bold; color: #555; }
        .size-slider { width: 15px; height: 90px; writing-mode: vertical-lr; direction: rtl; accent-color: #e84393; cursor: pointer; }

        /* 중앙 아틀리에 판 */
        .artboard {
            position: relative;
            width: 450px;
            height: 550px;
            border-radius: 30px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.1);
            overflow: hidden;
            flex-shrink: 0; 
        }
        
        /* 👑 핵심 변경: 캔버스 자체를 손톱 모양 곡선으로 클리핑 & 기본 매니큐어 색상 지정 */
        #paintCanvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            width: 100%;
            height: 100%;
            clip-path: path('M 150 140 C 150 100, 300 100, 300 140 L 285 380 C 285 410, 165 410, 165 380 Z');
            background: radial-gradient(circle, #ffffff, #f7d6e0);
            transition: background 0.2s ease;
        }
        
        /* 손가락 레이어 오버레이 */
        .finger-overlay {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 2;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        @media (max-width: 768px) {
            body { justify-content: flex-start; overflow-y: auto; }
            .game-container { flex-direction: column; gap: 15px; }
            .left-menu { flex-direction: row; width: 450px; justify-content: space-between; }
            .slider-box { flex-direction: row; height: 44px; padding: 0 15px; border-radius: 25px; }
            .size-slider { writing-mode: horizontal-tb; width: 80px; height: 15px; }
            .right-menu { flex-direction: row; width: 420px; justify-content: space-around; }
        }
    </style>
</head>
<body>

    <h2>💅 리얼 손가락 손톱 꾸미기 놀이</h2>

    <div class="game-container">
        <!-- 왼쪽 메뉴 -->
        <div class="left-menu">
            <button class="btn" style="background-color: #ff7675; color: white; font-size: 18px;" onclick="undo()">↩️</button>
            <button class="btn" style="background-color: #ffeaa7;" onclick="clearAll()">🗑️</button>
            <button id="tool-pen" class="btn active" onclick="setMode('pen')">✏️</button>
            <button id="tool-eraser" class="btn" onclick="setMode('eraser')">🧼</button>
            
            <div class="slider-box">
                <span>크기</span>
                <input type="range" id="penSize" class="size-slider" min="15" max="60" value="30" oninput="updateSize(this.value)">
            </div>
        </div>

        <!-- 중앙 도화지판 -->
        <div class="artboard">
            <!-- 그림이 그려질 손톱 캔버스 -->
            <canvas id="paintCanvas" width="450" height="550"></canvas>
            
            <!-- 👑 진짜 손가락 실루엣과 관절 주름을 표현한 SVG 오버레이 -->
            <svg class="finger-overlay" viewBox="0 0 450 550">
                <!-- 네일숍 테이블 배경색 -->
                <rect width="450" height="550" fill="#f5f0f6" />
                
                <!-- 예쁜 피부톤의 손가락 입체 모양 (손톱 부위만 구멍 뚫기 적용) -->
                <path d="M 0 0 H 450 V 550 H 0 Z 
                         M 90 550 L 110 120 C 110 30, 340 30, 340 120 L 360 550 Z" 
                      fill="#fbc5b1" fill-rule: evenodd stroke="#e09985" stroke-width="2"/>
                
                <!-- 손가락 디테일 묘사 (손톱 밑 큐티클 선 및 마디 주름) -->
                <path d="M 162 385 C 162 412, 288 412, 288 385" fill="none" stroke="#d18671" stroke-width="3" stroke-linecap="round" />
                <path d="M 115 480 C 165 490, 285 490, 335 480" fill="none" stroke="#e09985" stroke-width="2.5" stroke-linecap="round" />
                <path d="M 120 492 C 170 502, 280 502, 330 492" fill="none" stroke="#e09985" stroke-width="2" stroke-linecap="round" />
            </svg>
        </div>

        <!-- 오른쪽 메뉴 -->
        <div class="right-menu">
            <div class="menu-column">
                <span class="column-title">바탕색</span>
                <button class="btn" style="background: #e84393;" onclick="fillPattern('color', '#e84393')"></button>
                <button class="btn" style="background: #9b59b6;" onclick="fillPattern('color', '#9b59b6')"></button>
                <button class="btn" style="background: linear-gradient(to right, #ff7675, #ffeaa7, #74b9ff);" onclick="fillPattern('rainbow')">🌈</button>
                <button class="btn" style="background: radial-gradient(#fff 20%, #fd79a8 21%) 0 0 / 14px 14px;" onclick="fillPattern('dots')">🔮</button>
                <button class="btn" style="background: #fff; font-size:15px; font-weight:bold;" onclick="fillPattern('clear')">지움</button>
            </div>
            
            <div class="menu-column">
                <span class="column-title">스티커</span>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🐸')">🐸</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🦁')">🦁</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🐰')">🐰</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🐼')">🐼</div>
                <div class="btn sticker-item" onpointerdown="startDrag(event, '🧁')">🧁</div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('paintCanvas');
        const ctx = canvas.getContext('2d');
        const sizeInput = document.getElementById('penSize');
        
        let isDrawing = false;
        let currentMode = 'pen'; 
        let currentColor = '#e84393';
        
        let undoStack = [];
        const maxUndo = 15;

        let dragGhost = null;
        let draggedSticker = '';

        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';
        ctx.lineWidth = sizeInput.value;
        ctx.strokeStyle = currentColor;

        function getCanvasCoords(clientX, clientY) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: (clientX - rect.left) * (canvas.width / rect.width),
                y: (clientY - rect.top) * (canvas.height / rect.height)
            };
        }

        function saveState() {
            if (undoStack.length >= maxUndo) undoStack.shift();
            undoStack.push(canvas.toDataURL());
        }

        function undo() {
            if (undoStack.length === 0) return;
            let previousState = undoStack.pop();
            let img = new Image();
            img.src = previousState;
            img.onload = () => {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(img, 0, 0);
            };
        }

        function setMode(mode) {
            currentMode = mode;
            document.getElementById('tool-pen').classList.remove('active');
            document.getElementById('tool-eraser').classList.remove('active');
            
            if (mode === 'pen') {
                document.getElementById('tool-pen').classList.add('active');
                ctx.globalCompositeOperation = 'source-over';
                ctx.strokeStyle = currentColor;
                ctx.lineWidth = sizeInput.value;
            } else if (mode === 'eraser') {
                document.getElementById('tool-eraser').classList.add('active');
                ctx.globalCompositeOperation = 'destination-out';
                ctx.lineWidth = Math.max(parseInt(sizeInput.value), 25);
            }
        }

        function updateSize(value) {
            ctx.lineWidth = value;
        }

        // 👑 핵심 변경 2: 캔버스 배경 스타일을 직접 조작하여 지우개 버그 차단
        function fillPattern(type, arg = '') {
            if (type === 'color') {
                canvas.style.background = arg;
                currentColor = arg;
                if (currentMode === 'pen') ctx.strokeStyle = currentColor;
            } else if (type === 'rainbow') {
                canvas.style.background = 'linear-gradient(to bottom, #ff7675, #ffeaa7, #74b9ff)';
            } else if (type === 'dots') {
                canvas.style.background = 'radial-gradient(#fff 20%, #fd79a8 21%) 0 0 / 14px 14px';
            } else if (type === 'clear') {
                canvas.style.background = 'radial-gradient(circle, #ffffff, #f7d6e0)';
            }
        }

        function clearAll() {
            saveState();
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        // 드래그 시작
        function startDrag(e, sticker) {
            e.preventDefault();
            draggedSticker = sticker;
            
            dragGhost = document.createElement('div');
            dragGhost.className = 'drag-ghost';
            dragGhost.innerText = sticker;
            
            // 👑 크기 배율 감소 (1.8 -> 1.1)로 귀여운 미니 크기 연출
            const size = parseInt(sizeInput.value) * 1.1;
            dragGhost.style.fontSize = `${size}px`;
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
            
            document.body.appendChild(dragGhost);
            
            window.addEventListener('pointermove', onDrag);
            window.addEventListener('pointerup', onDrop);
        }

        function onDrag(e) {
            if (!dragGhost) return;
            dragGhost.style.left = `${e.clientX}px`;
            dragGhost.style.top = `${e.clientY}px`;
        }

        // 드롭
        function onDrop(e) {
            if (!dragGhost) return;
            
            const rect = canvas.getBoundingClientRect();
            
            if (e.clientX >= rect.left && e.clientX <= rect.right &&
                e.clientY >= rect.top && e.clientY <= rect.bottom) {
                
                const coords = getCanvasCoords(e.clientX, e.clientY);
                
                saveState();
                ctx.globalCompositeOperation = 'source-over';
                
                // 안착 스티커 크기도 축소 적용
                ctx.font = `${parseInt(sizeInput.value) * 1.1}px 'Malgun Gothic'`;
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(draggedSticker, coords.x, coords.y);
            }
            
            document.body.removeChild(dragGhost);
            dragGhost = null;
            window.removeEventListener('pointermove', onDrag);
            window.removeEventListener('pointerup', onDrop);
        }

        // 그리기
        canvas.addEventListener('pointerdown', (e) => {
            saveState();
            isDrawing = true;
            ctx.beginPath();
            const coords = getCanvasCoords(e.clientX, e.clientY);
            ctx.moveTo(coords.x, coords.y);
        });

        canvas.addEventListener('pointermove', (e) => {
            if (!isDrawing) return;
            const coords = getCanvasCoords(e.clientX, e.clientY);
            ctx.lineTo(coords.x, coords.y);
            ctx.stroke();
        });

        canvas.addEventListener('pointerup', () => isDrawing = false);
        canvas.addEventListener('pointerleave', () => isDrawing = false);
    </script>
</body>
</html>
